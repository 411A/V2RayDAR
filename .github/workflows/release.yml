name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: v2raydar.exe
            asset: v2raydar-windows-x86_64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: v2raydar
            asset: v2raydar-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: v2raydar
            asset: v2raydar-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            binary: v2raydar
            asset: v2raydar-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Stage executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $source = Join-Path "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          $destination = Join-Path "dist" "${{ matrix.asset }}"
          Copy-Item -LiteralPath $source -Destination $destination

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked

  publish:
    name: Publish GitHub release
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.ref_name }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Download executable artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $lines = Get-ChildItem -LiteralPath dist -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          $lines | Set-Content -LiteralPath "dist/checksums.txt" -Encoding ascii

      - name: Create or update release
        shell: bash
        run: |
          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber --repo "$REPOSITORY"
          else
            gh release create "$TAG_NAME" dist/* \
              --repo "$REPOSITORY" \
              --title "V2RayDAR $TAG_NAME" \
              --notes "Single-file V2RayDAR executables for Windows, Linux, and macOS. Download sing-box separately for active probing."
          fi
