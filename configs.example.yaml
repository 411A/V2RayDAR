bind: 127.0.0.1:27141
top_n: 10
refresh_seconds: 300
encoded_subscription: true
prioritize_stability: true
scan_all_configs: false
fetch_timeout_ms: 30000
fetch_concurrency: 8
max_subscription_bytes: 33554432
# When true, skip subscription URLs and test only cached subscription snapshots.
use_cache_only: false
# Optional direct share link used through sing-box to fetch subscriptions on restricted networks.
emergency_config: null

sharing:
  enabled: false
  require_token: false
  token: null

probe:
  mode: active
  sing_box_path: null
  connect_timeout_ms: 5000
  active_timeout_ms: 30000
  startup_timeout_ms: 5000
  concurrency: 16
  batch_size: 20
  # Auto or user values are internally capped (ACTIVE_PROBE_PROCESS_MAX_CONCURRENCY) to avoid process/socket congestion.
  process_concurrency: null
  test_url: https://www.gstatic.com/generate_204
  accepted_statuses: [204, 200]
  download_url: null
  # Or:
  # download_url: https://archive.org/download/steamboat-willie_1928/steamboat-willie_1928.ia.mp4
  download_bytes_limit: 1048576

subscriptions:
  - name: first
    url: https://github.com/Epodonios/v2ray-configs/raw/main/All_Configs_Sub.txt
    enabled: true
    priority: 1
  - name: second
    url: https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_base64_Sub.txt
    enabled: true
    priority: 2
